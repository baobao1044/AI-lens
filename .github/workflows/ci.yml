name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp]"
          python -m pip install build pytest

      - name: Byte-compile sources
        run: python -m compileall mcp_server.py scripts

      - name: Validate skill metadata
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          import yaml

          content = Path("SKILL.md").read_text(encoding="utf-8")
          match = re.match(r"^---\n(.*?)\n---", content, re.DOTALL)
          assert match, "Missing YAML frontmatter in SKILL.md"
          frontmatter = yaml.safe_load(match.group(1))
          assert isinstance(frontmatter, dict), "Frontmatter must be a mapping"
          assert frontmatter.get("name") == "ai-lens", "Unexpected skill name"
          assert isinstance(frontmatter.get("description"), str) and frontmatter["description"].strip(), "Missing skill description"
          print("skill-metadata-ok")
          PY

      - name: Import smoke test
        run: |
          python -c "import mcp_server; import scripts.scan; import scripts.query; import scripts.semantic; import scripts.symbol_graph; print('imports-ok')"

      - name: CLI help smoke test
        run: |
          python scripts/scan.py --help
          python scripts/query.py --help
          python scripts/watch.py --help

      - name: Build distribution
        run: python -m build

      - name: Run pytest
        if: ${{ hashFiles('tests/**/*.py') != '' }}
        run: pytest -q

  windows-smoke:
    name: Smoke (Python 3.12 on Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp]"

      - name: Byte-compile sources
        run: python -m compileall mcp_server.py scripts

      - name: CLI smoke test
        run: |
          python scripts/scan.py --help
          python scripts/query.py --help
          python scripts/watch.py --help

      - name: Import smoke test
        run: python -c "import mcp_server; import scripts.scan; import scripts.query; print('windows-imports-ok')"
